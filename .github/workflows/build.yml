name: Native AOT Libraries

on:
  workflow_dispatch:
  push:
    branches: [ "ygopro3" ]

jobs:
  windows:
    name: Windows ${{ matrix.rid }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write DeckData.cs
        run: python .ci/gen_deckdata.py

      - name: Publish Native AOT shared library
        shell: pwsh
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: zip artifact
        run: |
          choco install zip
          cd artifacts/native
          zip -r windbot-${{ matrix.rid }}.zip ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}.zip
          path: artifacts/native/windbot-${{ matrix.rid }}.zip

  linux:
    name: Linux ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-22.04
          - rid: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write DeckData.cs
        run: python .ci/gen_deckdata.py

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd artifacts/native
          zip -r windbot-${{ matrix.rid }}.zip ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}.zip
          path: artifacts/native/windbot-${{ matrix.rid }}.zip

  macos:
    name: macOS ${{ matrix.rid }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        rid:
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write DeckData.cs
        run: python .ci/gen_deckdata.py

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd artifacts/native
          zip -r windbot-${{ matrix.rid }}.zip ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}.zip
          path: artifacts/native/windbot-${{ matrix.rid }}.zip

  android:
    name: Android ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            abi: x86_64
            rid: linux-bionic-x64
            target-framework: net8.0
            clang: x86_64-linux-android24-clang
          - name: arm64
            abi: arm64-v8a
            rid: linux-bionic-arm64
            target-framework: net8.0
            clang: aarch64-linux-android24-clang
          - name: arm
            abi: armeabi-v7a
            rid: linux-bionic-arm
            target-framework: net10.0
            clang: armv7a-linux-androideabi24-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write DeckData.cs
        run: python .ci/gen_deckdata.py

      - name: Publish Native AOT shared library
        run: |
          android_toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          dotnet publish WindBot.csproj \
            -c Release \
            -f ${{ matrix.target-framework }} \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:IncludeNet10=true \
            -p:PublishAot=true \
            -p:PublishAotUsingRuntimePack=true \
            -p:NativeLib=Shared \
            -p:OutputType=Library \
            -p:StripSymbols=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:SysRoot="$android_toolchain/sysroot" \
            -p:CppCompilerAndLinker="$android_toolchain/bin/${{ matrix.clang }}" \
            -o artifacts/native/android-${{ matrix.abi }}

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd artifacts/native
          zip -r windbot-android-${{ matrix.abi }}.zip android-${{ matrix.abi }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-android-${{ matrix.abi }}.zip
          path: artifacts/native/windbot-android-${{ matrix.abi }}.zip

  create-release:
    needs: [android, windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Ensure release exists
        run: |
          gh release view release-latest || \
          gh release create release-latest --title "release-latest" --notes "Auto build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets
        run: |
          cd build
          gh release upload release-latest $(find . -type f) --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

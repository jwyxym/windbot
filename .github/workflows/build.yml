name: Native AOT Libraries

on:
  workflow_dispatch:
  push:
    branches: [ "ygopro3" ]

jobs:
  windows:
    name: Windows ${{ matrix.rid }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write cs
        run: |
          python .ci/gen_deckdata.py
          python .ci/gen_dialogdata.py

      - name: Publish Native AOT shared library
        shell: pwsh
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: zip artifact
        run: |
          choco install zip
          cd artifacts/native/${{ matrix.rid }}
          rm -r *.config
          zip -r windbot-${{ matrix.rid }}.zip *.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}.zip
          path: artifacts/native/${{ matrix.rid }}/windbot-${{ matrix.rid }}.zip

  linux:
    name: Linux ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-22.04
          - rid: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write cs
        run: |
          python .ci/gen_deckdata.py
          python .ci/gen_dialogdata.py

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd artifacts/native/${{ matrix.rid }}
          rm -r *.config
          zip -r windbot-${{ matrix.rid }}.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}.zip
          path: artifacts/native/${{ matrix.rid }}/windbot-${{ matrix.rid }}.zip

  linux-amd64-executable:
    name: Linux amd64 executable
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev zip

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write cs
        run: |
          python .ci/gen_deckdata.py
          python .ci/gen_dialogdata.py

      - name: Publish Native AOT executable
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r linux-x64
          --self-contained true
          -p:PublishAot=true
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/linux-amd64-executable

      - name: zip artifact
        run: |
          cd artifacts/native/linux-amd64-executable
          rm -f *.config
          chmod +x WindBot
          zip -r windbot-linux-amd64-executable.zip WindBot *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-linux-amd64.zip
          path: artifacts/native/linux-amd64-executable/windbot-linux-amd64-executable.zip

  build-macos:
    name: macOS ${{ matrix.rid }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        rid:
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write cs
        run: |
          python .ci/gen_deckdata.py
          python .ci/gen_dialogdata.py

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -f net8.0
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/*

  macos:
    runs-on: macos-latest
    needs: build-macos

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windbot-osx-x64
          path: x64

      - uses: actions/download-artifact@v4
        with:
          name: windbot-osx-arm64
          path: arm64

      - name: Combine universal dylib
        run: |
          mkdir dist
          lipo -create \
            -output dist/Windbot.dylib \
            x64/Windbot.dylib \
            arm64/Windbot.dylib
          lipo -create \
            -output dist/libe_sqlite3.dylib \
            x64/libe_sqlite3.dylib \
            arm64/libe_sqlite3.dylib

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd dist
          zip -r windbot-macos-universal.zip *.dylib

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-macos-universal
          path: dist/windbot-macos-universal.zip

  android:
    name: Android ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            abi: x86_64
            rid: linux-bionic-x64
            target-framework: net8.0
            clang: x86_64-linux-android24-clang
          - name: arm64
            abi: arm64-v8a
            rid: linux-bionic-arm64
            target-framework: net8.0
            clang: aarch64-linux-android24-clang
          - name: arm
            abi: armeabi-v7a
            rid: linux-bionic-arm
            target-framework: net10.0
            clang: armv7a-linux-androideabi24-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Write cs
        run: |
          python .ci/gen_deckdata.py
          python .ci/gen_dialogdata.py

      - name: Publish Native AOT shared library
        run: |
          android_toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          dotnet publish WindBot.csproj \
            -c Release \
            -f ${{ matrix.target-framework }} \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:IncludeNet10=true \
            -p:PublishAot=true \
            -p:PublishAotUsingRuntimePack=true \
            -p:NativeLib=Shared \
            -p:OutputType=Library \
            -p:StripSymbols=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:SysRoot="$android_toolchain/sysroot" \
            -p:CppCompilerAndLinker="$android_toolchain/bin/${{ matrix.clang }}" \
            -o artifacts/native/android-${{ matrix.abi }}

      - name: Build Android e_sqlite3
        run: |
          android_toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          sqlite_version="3450300"
          sqlite_dir="sqlite-amalgamation-${sqlite_version}"
          curl -L -o sqlite-amalgamation.zip "https://www.sqlite.org/2024/sqlite-amalgamation-${sqlite_version}.zip"
          unzip -q sqlite-amalgamation.zip
          "$android_toolchain/bin/${{ matrix.clang }}" \
            -shared \
            -fPIC \
            -O2 \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_ENABLE_FTS3 \
            -DSQLITE_ENABLE_FTS3_PARENTHESIS \
            -DSQLITE_ENABLE_FTS4 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_UNLOCK_NOTIFY \
            -DSQLITE_DEFAULT_MEMSTATUS=0 \
            "$sqlite_dir/sqlite3.c" \
            -o "artifacts/native/android-${{ matrix.abi }}/libe_sqlite3.so" \
            -ldl \
            -lm
          "$android_toolchain/bin/llvm-readelf" -d "artifacts/native/android-${{ matrix.abi }}/libe_sqlite3.so"

      - name: Verify Android native libraries
        run: |
          android_toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          for lib in artifacts/native/android-${{ matrix.abi }}/*.so; do
            echo "==== $lib"
            "$android_toolchain/bin/llvm-readelf" -d "$lib"
            if "$android_toolchain/bin/llvm-readelf" -d "$lib" | grep -E "libc\.so\.6|ld-linux"; then
              echo "$lib depends on glibc and is not an Android library"
              exit 1
            fi
          done

      - name: zip artifact
        run: |
          apt-get update && apt-get install -y zip
          cd artifacts/native/android-${{ matrix.abi }}
          rm -r *.config
          zip -r windbot-android-${{ matrix.abi }}.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-android-${{ matrix.abi }}.zip
          path: artifacts/native/android-${{ matrix.abi }}/windbot-android-${{ matrix.abi }}.zip

  create-release:
    needs: [android, windows, macos, linux, linux-amd64-executable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Ensure release exists
        run: |
          gh release view release-latest || \
          gh release create release-latest --title "release-latest" --notes "Auto build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets
        run: |
          cd build
          gh release upload release-latest $(find . -type f -name "*.zip") --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Native AOT Libraries

on:
  workflow_dispatch:
  push:
    branches: [ "ygopro3" ]

jobs:
  windows:
    name: Windows ${{ matrix.rid }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Native AOT shared library
        shell: pwsh
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: Keep single native library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/single/${{ matrix.rid }} | Out-Null
          Get-ChildItem -Recurse artifacts/native/${{ matrix.rid }}
          $library = Get-ChildItem -Recurse artifacts/native/${{ matrix.rid }} -Filter *.dll | Where-Object { $_.Name -eq 'WindBot.dll' -or $_.Name -eq 'windbot.dll' } | Select-Object -First 1
          if ($null -eq $library) { throw "Native library was not found." }
          Copy-Item $library.FullName artifacts/single/${{ matrix.rid }}/$($library.Name)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}
          path: artifacts/single/${{ matrix.rid }}/*

  linux:
    name: Linux ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-22.04
          - rid: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: Keep single native library
        run: |
          mkdir -p artifacts/single/${{ matrix.rid }}
          find artifacts/native/${{ matrix.rid }} -maxdepth 3 -type f -print
          library="$(find artifacts/native/${{ matrix.rid }} -maxdepth 3 -type f -name '*.so' | head -n 1)"
          test -n "$library"
          cp "$library" artifacts/single/${{ matrix.rid }}/"$(basename "$library")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}
          path: artifacts/single/${{ matrix.rid }}/*

  macos:
    name: macOS ${{ matrix.rid }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        rid:
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Native AOT shared library
        run: >
          dotnet publish WindBot.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:NativeLib=Shared
          -p:OutputType=Library
          -p:StripSymbols=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o artifacts/native/${{ matrix.rid }}

      - name: Keep single native library
        run: |
          mkdir -p artifacts/single/${{ matrix.rid }}
          find artifacts/native/${{ matrix.rid }} -maxdepth 3 -type f -print
          library="$(find artifacts/native/${{ matrix.rid }} -maxdepth 3 -type f -name '*.dylib' | head -n 1)"
          test -n "$library"
          cp "$library" artifacts/single/${{ matrix.rid }}/"$(basename "$library")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-${{ matrix.rid }}
          path: artifacts/single/${{ matrix.rid }}/*

  android:
    name: Android ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            rid: linux-bionic-x64
            clang: x86_64-linux-android24-clang
          - name: arm64
            rid: linux-bionic-arm64
            clang: aarch64-linux-android24-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Publish Native AOT shared library
        run: |
          android_toolchain="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          dotnet publish WindBot.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishAot=true \
            -p:NativeLib=Shared \
            -p:OutputType=Library \
            -p:StripSymbols=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:SysRoot="$android_toolchain/sysroot" \
            -p:CppCompilerAndLinker="$android_toolchain/bin/${{ matrix.clang }}" \
            -o artifacts/native/android-${{ matrix.name }}

      - name: Keep single native library
        run: |
          mkdir -p artifacts/single/android-${{ matrix.name }}
          find artifacts/native/android-${{ matrix.name }} -maxdepth 3 -type f -print
          library="$(find artifacts/native/android-${{ matrix.name }} -maxdepth 3 -type f -name '*.so' | head -n 1)"
          test -n "$library"
          cp "$library" artifacts/single/android-${{ matrix.name }}/"$(basename "$library")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windbot-android-${{ matrix.name }}
          path: artifacts/single/android-${{ matrix.name }}/*
